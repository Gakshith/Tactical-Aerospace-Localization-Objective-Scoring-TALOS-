artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: aceofspades914/cgi-planes-in-satellite-imagery-w-bboxes
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion


data_validation:
  root_dir: artifacts/data_validation
  unzip_data_dir: artifacts/data_ingestion
  STATUS_FILE: artifacts/data_validation/status.txt


data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion

model_train:
  root_dir: artifacts/model_trainer
  data_path : artifacts/data_transformation/talos_data.yaml
  model_name: model.joblib
  epochs: 1
  imgsz: 1024
  rect: True
  batch: 8
  device: "cpu"
  plots: True

model_run:
  root_dir: artifacts/model_run
  model_path: artifacts/model_trainer/best.pt
  source_video_path: source_video/input.mp4
  output_video_path: artifacts/model_run/Output.mp4
